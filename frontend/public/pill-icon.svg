<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="pillGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Pill capsule -->
  <rect x="15" y="30" width="70" height="40" rx="20" ry="20" fill="url(#pillGradient)"/>
  
  <!-- Pill divider line -->
  <line x1="50" y1="30" x2="50" y2="70" stroke="white" stroke-width="2" opacity="0.5"/>
  
  <!-- Small dots for detail -->
  <circle cx="35" cy="50" r="3" fill="white" opacity="0.7"/>
  <circle cx="65" cy="50" r="3" fill="white" opacity="0.7"/>
  
  <!-- Plus sign for medical -->
  <g transform="translate(75, 15)">
    <rect x="-2" y="-8" width="4" height="16" fill="#ef4444" rx="2"/>
    <rect x="-8" y="-2" width="16" height="4" fill="#ef4444" rx="2"/>
  </g>
</svg>
